          - ["vou embora", "می‌روم", "اصطلاح"]

  - title: "Gostar"
    explanation: |
      **Gostar** به معنی **دوست داشتن** است:
      - بیان ترجیحات
      - **همیشه با "de"** (gostar de)
      - سلیقه، ترجیح

      **صرف زمان حال**:
      - eu gosto (من دوست دارم)
      - tu gostas (تو دوست داری)
      - ele/ela/você gosta (او دوست دارد)
      - nós gostamos (ما دوست داریم)
      - vós gostais (شما دوست دارید)
      - eles/elas gostam (آن‌ها دوست دارند)
      - **Gerúndio**: gostando (دوست داشتن)
    examples:
      - q: "Eu gosto de música."
        a: "من موسیقی دوست دارم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["gosto de", "دوست دارم", "gostar - من دوست دارم"]
          - ["música", "موسیقی", "اسم"]

      - q: "Tu gostas de ler?"
        a: "آیا خواندن دوست داری؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["gostas de", "دوست داری", "gostar - تو دوست داری"]
          - ["ler", "خواندن", "فعل"]

      - q: "Ela gosta de viajar."
        a: "او سفر کردن دوست دارد."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["gosta de", "دوست دارد", "gostar - او دوست دارد"]
          - ["viajar", "سفر کردن", "فعل"]

      - q: "Nós gostamos de ti."
        a: "ما تو را دوست داریم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["gostamos de", "دوست داریم", "gostar - ما دوست داریم"]
          - ["ti", "تو", "ضمیر"]

      - q: "Vós gostais de chocolate?"
        a: "آیا شکلات دوست دارید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["gostais de", "دوست دارید", "gostar - شما دوست دارید"]
          - ["chocolate", "شکلات", "اسم - غذا"]

      - q: "Eles gostam de futebol."
        a: "آن‌ها فوتبال دوست دارند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["gostam de", "دوست دارند", "gostar - آن‌ها دوست دارند"]
          - ["futebol", "فوتبال", "اسم - ورزش"]

      - q: "Gostando do lugar, fico mais tempo."
        a: "اگر مکان را دوست داشته باشم، بیشتر می‌مانم."
        labels: ["Gerúndio"]
        rel:
          - ["gostando de", "دوست داشتن", "gostar - وجه وصفی"]
          - ["lugar", "مکان", "اسم"]
          - ["mais tempo", "بیشتر", "زمان"]

  - title: "اصطلاحات با Querer و Gostar"
    explanation: |
      **اصطلاحات رایج**:
      - Querer dizer = معنی دادن (چه معنی دارد؟)
      - Querer bem = دوست داشتن کسی
      - Gostar muito = خیلی دوست داشتن
      - Não gostar nada = اصلاً دوست نداشتن
    examples:
      - q: "O que quer dizer?"
        a: "چه معنی می‌دهد؟"
        labels: ["اصطلاح", "سوال"]
        rel:
          - ["quer dizer", "معنی می‌دهد", "اصطلاح"]
          - ["o que", "چه", "کلمه پرسشی"]

      - q: "Eu quero-te bem."
        a: "من تو را دوست دارم."
        labels: ["اصطلاح"]
        rel:
          - ["quero-te bem", "تو را دوست دارم", "اصطلاح"]

      - q: "Gosto muito de ti."
        a: "خیلی تو را دوست دارم."
        labels: ["اصطلاح"]
        rel:
          - ["gosto muito", "خیلی دوست دارم", "تقویت‌کننده"]
          - ["muito", "خیلی", "قید"]

      - q: "Não gosto nada disso."
        a: "اصلاً آن را دوست ندارم."
        labels: ["اصطلاح", "نفی"]
        rel:
          - ["não gosto nada", "اصلاً دوست ندارم", "نفی"]
          - ["nada", "هیچ/اصلاً", "قید"]
          - ["disso", "از آن", "ضمیر"]

      - q: "Queres alguma coisa?"
        a: "چیزی می‌خواهی؟"
        labels: ["ادب", "سوال"]
        rel:
          - ["queres", "می‌خواهی", "querer - پیشنهاد"]
          - ["alguma coisa", "چیزی", "اصطلاح"]
