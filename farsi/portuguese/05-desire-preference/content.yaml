number: 5
title: "آرزوها و ترجیحات - خواستن، ماندن، دوست داشتن"
description: "افعال querer، ficar و gostar با تمام صرف‌ها"
sections:
  - title: "Querer"
    explanation: |
      **Querer** به معنی **خواستن** است:
      - بیان آرزوها
      - خواستن، میل داشتن
      - اغلب با مصدر (quero comer = می‌خواهم بخورم)

      **صرف زمان حال**:
      - eu quero (من می‌خواهم)
      - tu queres (تو می‌خواهی)
      - ele/ela/você quer (او می‌خواهد)
      - nós queremos (ما می‌خواهیم)
      - vós quereis (شما می‌خواهید)
      - eles/elas querem (آن‌ها می‌خواهند)
      - **Gerúndio**: querendo (خواستن)
    examples:
      - q: "Eu quero café."
        a: "من قهوه می‌خواهم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["quero", "می‌خواهم", "querer - من می‌خواهم"]
          - ["café", "قهوه", "اسم - نوشیدنی"]

      - q: "Tu queres ir ao cinema?"
        a: "آیا می‌خواهی به سینما بروی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["queres", "می‌خواهی", "querer - تو می‌خواهی"]
          - ["ir", "رفتن", "فعل"]
          - ["cinema", "سینما", "اسم"]

      - q: "Ele quer aprender português."
        a: "او می‌خواهد پرتغالی یاد بگیرد."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["quer", "می‌خواهد", "querer - او می‌خواهد"]
          - ["aprender", "یاد گرفتن", "فعل"]
          - ["português", "پرتغالی", "زبان"]

      - q: "Nós queremos ajudar."
        a: "ما می‌خواهیم کمک کنیم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["queremos", "می‌خواهیم", "querer - ما می‌خواهیم"]
          - ["ajudar", "کمک کردن", "فعل"]

      - q: "Vós quereis comer alguma coisa?"
        a: "آیا می‌خواهید چیزی بخورید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["quereis", "می‌خواهید", "querer - شما می‌خواهید"]
          - ["comer", "خوردن", "فعل"]
          - ["alguma coisa", "چیزی", "اصطلاح"]

      - q: "Eles querem paz."
        a: "آن‌ها صلح می‌خواهند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["querem", "می‌خواهند", "querer - آن‌ها می‌خواهند"]
          - ["paz", "صلح", "اسم"]

      - q: "Querendo ou não, tens que ir."
        a: "چه بخواهی چه نخواهی، باید بروی."
        labels: ["Gerúndio"]
        rel:
          - ["querendo", "خواستن", "querer - وجه وصفی"]
          - ["ou não", "یا نه", "اصطلاح"]

  - title: "Ficar"
    explanation: |
      **Ficar** معانی مختلفی دارد:
      - ماندن (در یک مکان)
      - شدن (تغییر حالت)
      - قرار داشتن
      - مناسب بودن (ficar bem)

      **صرف زمان حال**:
      - eu fico (من می‌مانم)
      - tu ficas (تو می‌مانی)
      - ele/ela/você fica (او می‌ماند)
      - nós ficamos (ما می‌مانیم)
      - vós ficais (شما می‌مانید)
      - eles/elas ficam (آن‌ها می‌مانند)
      - **Gerúndio**: ficando (ماندن)
    examples:
      - q: "Eu fico em casa."
        a: "من در خانه می‌مانم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["fico", "می‌مانم", "ficar - من می‌مانم"]
          - ["em casa", "در خانه", "مکان"]

      - q: "Tu ficas contente com isso?"
        a: "آیا با این راضی می‌شوی؟"
        labels: ["حال", "دوم شخص مفرد"]
        rel:
          - ["ficas", "می‌شوی", "ficar - تو می‌شوی"]
          - ["contente", "راضی", "صفت"]
          - ["com isso", "با این", "اصطلاح"]

      - q: "Ela fica no hotel."
        a: "او در هتل می‌ماند."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["fica", "می‌ماند", "ficar - او می‌ماند"]
          - ["hotel", "هتل", "اسم - اقامتگاه"]

      - q: "Nós ficamos aqui."
        a: "ما اینجا می‌مانیم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["ficamos", "می‌مانیم", "ficar - ما می‌مانیم"]
          - ["aqui", "اینجا", "مکان"]

      - q: "Vós ficais bem com essas roupas."
        a: "این لباس‌ها به شما می‌آید."
        labels: ["حال", "دوم شخص جمع"]
        rel:
          - ["ficais", "می‌آید", "ficar - مناسب بودن"]
          - ["bem", "خوب", "قید"]
