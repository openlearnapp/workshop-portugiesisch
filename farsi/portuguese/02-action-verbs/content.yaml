number: 2
title: "افعال حرکتی - رفتن، آمدن، انجام دادن"
description: "افعال ir، vir و fazer با تمام صرف‌ها"
sections:
  - title: "Ir"
    explanation: |
      **Ir** به معنی **رفتن** است و استفاده می‌شود برای:
      - حرکت به یک مکان
      - برنامه‌های آینده (ir + مصدر)
      - اغلب با حروف اضافه (a, para, em)

      **صرف زمان حال**:
      - eu vou (من می‌روم)
      - tu vais (تو می‌روی)
      - ele/ela/você vai (او می‌رود، شما می‌روید)
      - nós vamos (ما می‌رویم)
      - vós ides (شما می‌روید)
      - eles/elas vão (آن‌ها می‌روند)
      - **Gerúndio**: indo (رفتن)
    examples:
      - q: "Eu vou à escola."
        a: "من به مدرسه می‌روم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["vou", "می‌روم", "ir - من می‌روم"]
          - ["à escola", "به مدرسه", "مکان - آموزش"]

      - q: "Tu vais ao supermercado?"
        a: "آیا به سوپرمارکت می‌روی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["vais", "می‌روی", "ir - تو می‌روی"]
          - ["ao supermercado", "به سوپرمارکت", "مکان - خرید"]

      - q: "Ele vai para o trabalho."
        a: "او به سر کار می‌رود."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["vai", "می‌رود", "ir - او می‌رود"]
          - ["para o trabalho", "به سر کار", "مکان - شغل"]
          - ["trabalho", "کار", "اسم"]

      - q: "Nós vamos ao cinema."
        a: "ما به سینما می‌رویم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["vamos", "می‌رویم", "ir - ما می‌رویم"]
          - ["ao cinema", "به سینما", "مکان - سرگرمی"]
          - ["cinema", "سینما", "اسم"]

      - q: "Vós ides à praia?"
        a: "آیا به ساحل می‌روید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["ides", "می‌روید", "ir - شما می‌روید"]
          - ["à praia", "به ساحل", "مکان - تفریح"]
          - ["praia", "ساحل", "اسم"]

      - q: "Eles vão de autocarro."
        a: "آن‌ها با اتوبوس می‌روند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["vão", "می‌روند", "ir - آن‌ها می‌روند"]
          - ["de autocarro", "با اتوبوس", "وسیله نقلیه"]
          - ["autocarro", "اتوبوس", "اسم - حمل و نقل"]

      - q: "Indo para casa, vi um amigo."
        a: "در راه خانه، یک دوست را دیدم."
        labels: ["Gerúndio"]
        rel:
          - ["indo", "رفتن", "ir - وجه وصفی"]
          - ["para casa", "به خانه", "جهت"]
          - ["vi", "دیدم", "ver - گذشته"]

  - title: "Vir"
    explanation: |
      **Vir** به معنی **آمدن** است و استفاده می‌شود برای:
      - حرکت به سمت گوینده
      - اصلیت
      - اغلب عکس "ir"

      **صرف زمان حال**:
      - eu venho (من می‌آیم)
      - tu vens (تو می‌آیی)
      - ele/ela/você vem (او می‌آید، شما می‌آیید)
      - nós vimos (ما می‌آییم)
      - vós vindes (شما می‌آیید)
      - eles/elas vêm (آن‌ها می‌آیند)
      - **Gerúndio**: vindo (آمدن)
    examples:
      - q: "Eu venho de Portugal."
        a: "من از پرتغال می‌آیم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["venho", "می‌آیم", "vir - من می‌آیم"]
          - ["de Portugal", "از پرتغال", "اصلیت"]

      - q: "Tu vens comigo?"
        a: "آیا با من می‌آیی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["vens", "می‌آیی", "vir - تو می‌آیی"]
          - ["comigo", "با من", "ضمیر"]

      - q: "Ela vem de autocarro."
        a: "او با اتوبوس می‌آید."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["vem", "می‌آید", "vir - او می‌آید"]
          - ["de autocarro", "با اتوبوس", "وسیله نقلیه"]

      - q: "Nós vimos jantar."
        a: "ما برای شام می‌آییم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["vimos", "می‌آییم", "vir - ما می‌آییم"]
          - ["jantar", "شام / شام خوردن", "اسم / فعل"]

      - q: "Vós vindes tarde."
        a: "شما دیر می‌آیید."
        labels: ["حال", "دوم شخص جمع"]
        rel:
          - ["vindes", "می‌آیید", "vir - شما می‌آیید"]
          - ["tarde", "دیر", "زمان"]

      - q: "Eles vêm amanhã."
        a: "آن‌ها فردا می‌آیند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["vêm", "می‌آیند", "vir - آن‌ها می‌آیند"]
          - ["amanhã", "فردا", "زمان"]

      - q: "Vindo de longe, estou cansado."
        a: "چون از راه دور آمدم، خسته هستم."
        labels: ["Gerúndio"]
        rel:
          - ["vindo", "آمدن", "vir - وجه وصفی"]
          - ["de longe", "از دور", "فاصله"]
          - ["cansado", "خسته", "صفت"]

  - title: "Fazer"
    explanation: |
      **Fazer** به معنی **انجام دادن/ساختن** است و استفاده می‌شود برای:
      - انجام فعالیت‌ها
      - ساختن چیزی
      - آب و هوا (faz calor = هوا گرم است)
      - زمان (faz dois dias = دو روز پیش)

      **صرف زمان حال**:
      - eu faço (من انجام می‌دهم)
      - tu fazes (تو انجام می‌دهی)
      - ele/ela/você faz (او انجام می‌دهد، شما انجام می‌دهید)
      - nós fazemos (ما انجام می‌دهیم)
      - vós fazeis (شما انجام می‌دهید)
      - eles/elas fazem (آن‌ها انجام می‌دهند)
      - **Gerúndio**: fazendo (انجام دادن)
    examples:
      - q: "Eu faço o pequeno-almoço."
        a: "من صبحانه درست می‌کنم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["faço", "درست می‌کنم", "fazer - من می‌سازم"]
          - ["o pequeno-almoço", "صبحانه", "اسم - وعده غذایی"]

      - q: "Tu fazes exercício?"
        a: "آیا ورزش می‌کنی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["fazes", "انجام می‌دهی", "fazer - تو انجام می‌دهی"]
          - ["exercício", "ورزش / تمرین", "اسم - فعالیت"]

      - q: "Ele faz anos amanhã."
        a: "فردا تولد اوست."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["faz", "می‌کند", "fazer - او انجام می‌دهد"]
          - ["anos", "تولد (سال‌ها)", "اسم"]

      - q: "Nós fazemos o trabalho de casa."
        a: "ما تکالیف را انجام می‌دهیم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["fazemos", "انجام می‌دهیم", "fazer - ما انجام می‌دهیم"]
          - ["trabalho de casa", "تکالیف", "اسم - مدرسه"]

      - q: "Vós fazeis bem."
        a: "شما خوب انجام می‌دهید."
        labels: ["حال", "دوم شخص جمع"]
        rel:
          - ["fazeis", "انجام می‌دهید", "fazer - شما انجام می‌دهید"]
          - ["bem", "خوب", "قید"]

      - q: "Eles fazem um bolo."
        a: "آن‌ها یک کیک درست می‌کنند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["fazem", "درست می‌کنند", "fazer - آن‌ها می‌سازند"]
          - ["um bolo", "یک کیک", "اسم - غذا"]
          - ["bolo", "کیک", "اسم"]

      - q: "Fazendo o meu melhor, consigo."
        a: "با تمام تلاشم، موفق می‌شوم."
        labels: ["Gerúndio"]
        rel:
          - ["fazendo", "انجام دادن", "fazer - وجه وصفی"]
          - ["o meu melhor", "بهترینم", "اصطلاح"]

  - title: "Ir + مصدر - آینده نزدیک"
    explanation: |
      **Ir + مصدر** **آینده نزدیک** را بیان می‌کند:
      - برنامه‌ها و قصدها
      - کاری که قرار است انجام شود
      - شبیه فارسی "می‌خواهم... / قرار است..."

      مثال: Vou estudar = می‌خواهم درس بخوانم
    examples:
      - q: "Eu vou fazer o jantar."
        a: "من شام درست خواهم کرد."
        labels: ["آینده", "ir + مصدر"]
        rel:
          - ["vou fazer", "خواهم ساخت", "آینده"]
          - ["jantar", "شام", "اسم - وعده غذایی"]

      - q: "Tu vais vir à festa?"
        a: "آیا به مهمانی خواهی آمد؟"
        labels: ["آینده", "سوال"]
        rel:
          - ["vais vir", "خواهی آمد", "آینده"]
          - ["à festa", "به مهمانی", "مکان - رویداد"]
          - ["festa", "مهمانی / جشن", "اسم"]

      - q: "Ela vai ir ao médico."
        a: "او به پزشک خواهد رفت."
        labels: ["آینده"]
        rel:
          - ["vai ir", "خواهد رفت", "آینده"]
          - ["ao médico", "به پزشک", "مکان - سلامت"]
          - ["médico", "پزشک", "اسم - شغل"]

      - q: "Nós vamos fazer uma viagem."
        a: "ما یک سفر خواهیم کرد."
        labels: ["آینده"]
        rel:
          - ["vamos fazer", "خواهیم کرد", "آینده"]
          - ["uma viagem", "یک سفر", "اسم - فعالیت"]
          - ["viagem", "سفر", "اسم"]

      - q: "Eles vão vir amanhã."
        a: "آن‌ها فردا خواهند آمد."
        labels: ["آینده"]
        rel:
          - ["vão vir", "خواهند آمد", "آینده"]
