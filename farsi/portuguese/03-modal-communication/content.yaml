number: 3
title: "افعال وجهی و ارتباط - توانستن، گفتن، دادن"
description: "افعال poder، dizer و dar با تمام صرف‌ها"
sections:
  - title: "Poder"
    explanation: |
      **Poder** به معنی **توانستن/اجازه داشتن** است:
      - توانایی (من می‌توانم شنا کنم)
      - اجازه (آیا می‌توانم؟)
      - امکان (ممکن است)

      **صرف زمان حال**:
      - eu posso (من می‌توانم)
      - tu podes (تو می‌توانی)
      - ele/ela/você pode (او می‌تواند، شما می‌توانید)
      - nós podemos (ما می‌توانیم)
      - vós podeis (شما می‌توانید)
      - eles/elas podem (آن‌ها می‌توانند)
      - **Gerúndio**: podendo (توانستن)
    examples:
      - q: "Eu posso ajudar?"
        a: "آیا می‌توانم کمک کنم؟"
        labels: ["حال", "اول شخص مفرد", "سوال"]
        rel:
          - ["posso", "می‌توانم", "poder - من می‌توانم"]
          - ["ajudar", "کمک کردن", "فعل - مصدر"]

      - q: "Tu podes falar português?"
        a: "آیا می‌توانی پرتغالی صحبت کنی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["podes", "می‌توانی", "poder - تو می‌توانی"]
          - ["falar", "صحبت کردن", "فعل"]
          - ["português", "پرتغالی", "زبان"]

      - q: "Ele pode vir connosco."
        a: "او می‌تواند با ما بیاید."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["pode", "می‌تواند", "poder - او می‌تواند"]
          - ["vir", "آمدن", "فعل"]
          - ["connosco", "با ما", "ضمیر"]

      - q: "Nós podemos comer aqui."
        a: "ما می‌توانیم اینجا غذا بخوریم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["podemos", "می‌توانیم", "poder - ما می‌توانیم"]
          - ["comer", "خوردن", "فعل"]
          - ["aqui", "اینجا", "مکان"]

      - q: "Vós podeis esperar?"
        a: "آیا می‌توانید صبر کنید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["podeis", "می‌توانید", "poder - شما می‌توانید"]
          - ["esperar", "صبر کردن", "فعل"]

      - q: "Eles podem começar agora."
        a: "آن‌ها می‌توانند الان شروع کنند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["podem", "می‌توانند", "poder - آن‌ها می‌توانند"]
          - ["começar", "شروع کردن", "فعل"]
          - ["agora", "الان", "زمان"]

      - q: "Podendo escolher, prefiro café."
        a: "اگر بتوانم انتخاب کنم، قهوه را ترجیح می‌دهم."
        labels: ["Gerúndio"]
        rel:
          - ["podendo", "توانستن", "poder - وجه وصفی"]
          - ["escolher", "انتخاب کردن", "فعل"]
          - ["café", "قهوه", "اسم - نوشیدنی"]

  - title: "Dizer"
    explanation: |
      **Dizer** به معنی **گفتن** است:
      - چیزی را بیان کردن
      - گزارش دادن، تعریف کردن
      - اغلب با "que" (که)

      **صرف زمان حال**:
      - eu digo (من می‌گویم)
      - tu dizes (تو می‌گویی)
      - ele/ela/você diz (او می‌گوید، شما می‌گویید)
      - nós dizemos (ما می‌گوییم)
      - vós dizeis (شما می‌گویید)
      - eles/elas dizem (آن‌ها می‌گویند)
      - **Gerúndio**: dizendo (گفتن)
    examples:
      - q: "Eu digo a verdade."
        a: "من حقیقت را می‌گویم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["digo", "می‌گویم", "dizer - من می‌گویم"]
          - ["a verdade", "حقیقت", "اسم"]
          - ["verdade", "حقیقت", "اسم"]

      - q: "Tu dizes sempre isso."
        a: "تو همیشه این را می‌گویی."
        labels: ["حال", "دوم شخص مفرد"]
        rel:
          - ["dizes", "می‌گویی", "dizer - تو می‌گویی"]
          - ["sempre", "همیشه", "قید - تکرار"]
          - ["isso", "این", "ضمیر"]

      - q: "Ela diz que sim."
        a: "او بله می‌گوید."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["diz", "می‌گوید", "dizer - او می‌گوید"]
          - ["que", "که", "حرف ربط"]
          - ["sim", "بله", "قید"]

      - q: "Nós dizemos olá."
        a: "ما سلام می‌گوییم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["dizemos", "می‌گوییم", "dizer - ما می‌گوییم"]
          - ["olá", "سلام", "احوالپرسی"]

      - q: "Vós dizeis coisas engraçadas."
        a: "شما چیزهای خنده‌دار می‌گویید."
        labels: ["حال", "دوم شخص جمع"]
        rel:
          - ["dizeis", "می‌گویید", "dizer - شما می‌گویید"]
          - ["coisas", "چیزها", "اسم"]
          - ["engraçadas", "خنده‌دار", "صفت"]

      - q: "Eles dizem que não."
        a: "آن‌ها نه می‌گویند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["dizem", "می‌گویند", "dizer - آن‌ها می‌گویند"]
          - ["não", "نه / نمی", "نفی"]

      - q: "Dizendo isto, ele saiu."
        a: "این را گفته، او رفت."
        labels: ["Gerúndio"]
        rel:
          - ["dizendo", "گفتن", "dizer - وجه وصفی"]
          - ["isto", "این", "ضمیر"]
          - ["saiu", "رفت", "sair - گذشته"]

  - title: "Dar"
    explanation: |
      **Dar** به معنی **دادن** است:
      - چیزی را تقدیم کردن
      - هدیه دادن
      - اصطلاحات زیاد (dar um passeio = قدم زدن)

      **صرف زمان حال**:
      - eu dou (من می‌دهم)
      - tu dás (تو می‌دهی)
      - ele/ela/você dá (او می‌دهد، شما می‌دهید)
      - nós damos (ما می‌دهیم)
      - vós dais (شما می‌دهید)
      - eles/elas dão (آن‌ها می‌دهند)
      - **Gerúndio**: dando (دادن)
    examples:
      - q: "Eu dou um presente."
        a: "من یک هدیه می‌دهم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["dou", "می‌دهم", "dar - من می‌دهم"]
          - ["um presente", "یک هدیه", "اسم"]
          - ["presente", "هدیه", "اسم"]

      - q: "Tu dás o livro ao professor."
        a: "تو کتاب را به معلم می‌دهی."
        labels: ["حال", "دوم شخص مفرد"]
        rel:
          - ["dás", "می‌دهی", "dar - تو می‌دهی"]
          - ["o livro", "کتاب", "اسم"]
          - ["ao professor", "به معلم", "مفعول غیرمستقیم"]

      - q: "Ele dá aulas de música."
        a: "او کلاس موسیقی می‌دهد."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["dá", "می‌دهد", "dar - او می‌دهد"]
          - ["aulas", "کلاس‌ها", "اسم"]
          - ["música", "موسیقی", "اسم"]

      - q: "Nós damos as boas-vindas."
        a: "ما خوش‌آمد می‌گوییم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["damos", "می‌دهیم", "dar - ما می‌دهیم"]
          - ["as boas-vindas", "خوش‌آمد", "اصطلاح"]

      - q: "Vós dais esmola?"
        a: "آیا شما صدقه می‌دهید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["dais", "می‌دهید", "dar - شما می‌دهید"]
          - ["esmola", "صدقه", "اسم"]

      - q: "Eles dão comida aos pobres."
        a: "آن‌ها به فقرا غذا می‌دهند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["dão", "می‌دهند", "dar - آن‌ها می‌دهند"]
          - ["comida", "غذا", "اسم"]
          - ["aos pobres", "به فقرا", "مفعول غیرمستقیم"]

      - q: "Dando tudo, consigo vencer."
        a: "با دادن همه چیز، می‌توانم پیروز شوم."
        labels: ["Gerúndio"]
        rel:
          - ["dando", "دادن", "dar - وجه وصفی"]
          - ["tudo", "همه چیز", "ضمیر"]
          - ["vencer", "پیروز شدن", "فعل"]

  - title: "درخواست‌ها با Poder"
    explanation: |
      **Poder** اغلب برای **درخواست‌های مودبانه** استفاده می‌شود:
      - Posso...? = آیا می‌توانم...؟ / آیا اجازه دارم...؟
      - Pode...? = آیا می‌توانید...؟
      - Poderia...? = آیا ممکن است...؟ (مودبانه‌تر)
    examples:
      - q: "Posso entrar?"
        a: "آیا می‌توانم وارد شوم؟"
        labels: ["ادب", "درخواست"]
        rel:
          - ["posso", "آیا می‌توانم", "poder - اجازه"]
          - ["entrar", "وارد شدن", "فعل"]

      - q: "Pode repetir, por favor?"
        a: "لطفاً می‌توانید تکرار کنید؟"
        labels: ["ادب", "درخواست"]
        rel:
          - ["pode", "می‌توانید", "poder - مودبانه"]
          - ["repetir", "تکرار کردن", "فعل"]
          - ["por favor", "لطفاً", "عبارت مودبانه"]

      - q: "Podemos sentar aqui?"
        a: "آیا می‌توانیم اینجا بنشینیم؟"
        labels: ["ادب", "درخواست"]
        rel:
          - ["podemos", "می‌توانیم", "poder"]
          - ["sentar", "نشستن", "فعل"]

      - q: "Posso fazer uma pergunta?"
        a: "آیا می‌توانم یک سوال بپرسم؟"
        labels: ["ادب", "درخواست"]
        rel:
          - ["posso fazer", "آیا می‌توانم بپرسم", "فعل وجهی + فعل"]
          - ["uma pergunta", "یک سوال", "اسم"]
          - ["pergunta", "سوال", "اسم"]

      - q: "Pode dar-me as horas?"
        a: "می‌توانید ساعت را به من بگویید؟"
        labels: ["ادب", "اصطلاح"]
        rel:
          - ["pode dar-me", "می‌توانید به من بدهید", "اصطلاح"]
          - ["as horas", "ساعت", "اسم"]
