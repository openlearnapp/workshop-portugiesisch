  - title: "درخواست‌های مودبانه"
    explanation: |
      **عبارات مودبانه با Pedir**:
      - Por favor = لطفاً
      - Pedir por favor = مودبانه درخواست کردن
      - Pedir desculpa = عذرخواهی کردن
      - Pedir licença = اجازه خواستن
    examples:
      - q: "Peço por favor que espere."
        a: "لطفاً از شما می‌خواهم صبر کنید."
        labels: ["ادب"]
        rel:
          - ["peço", "درخواست می‌کنم", "pedir - مودبانه"]
          - ["por favor", "لطفاً", "عبارت مودبانه"]
          - ["espere", "صبر کنید", "esperar - التزامی"]

      - q: "Posso pedir um favor?"
        a: "آیا می‌توانم لطفی بخواهم؟"
        labels: ["ادب", "سوال"]
        rel:
          - ["pedir um favor", "لطفی خواستن", "اصطلاح"]
          - ["favor", "لطف", "اسم"]

      - q: "Peço desculpa pelo atraso."
        a: "بابت تأخیر عذرخواهی می‌کنم."
        labels: ["ادب"]
        rel:
          - ["peço desculpa", "عذرخواهی می‌کنم", "اصطلاح"]
          - ["atraso", "تأخیر", "اسم"]

      - q: "Com licença, posso passar?"
        a: "ببخشید، آیا می‌توانم رد شوم؟"
        labels: ["ادب"]
        rel:
          - ["com licença", "ببخشید", "عبارت مودبانه"]
          - ["passar", "رد شدن", "فعل"]
