number: 8
title: "نگاه کردن و درخواست کردن - نگاه کردن، درخواست کردن، استفاده کردن"
description: "افعال olhar، pedir و usar با تمام صرف‌ها"
sections:
  - title: "Olhar"
    explanation: |
      **Olhar** به معنی **نگاه کردن** است:
      - نگاه کردن، تماشا کردن (آگاهانه)
      - خیره شدن، توجه کردن
      - Olhar para = نگاه کردن به

      **صرف زمان حال**:
      - eu olho (من نگاه می‌کنم)
      - tu olhas (تو نگاه می‌کنی)
      - ele/ela/você olha (او نگاه می‌کند)
      - nós olhamos (ما نگاه می‌کنیم)
      - vós olhais (شما نگاه می‌کنید)
      - eles/elas olham (آن‌ها نگاه می‌کنند)
      - **Gerúndio**: olhando (نگاه کردن)
    examples:
      - q: "Eu olho para o céu."
        a: "من به آسمان نگاه می‌کنم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["olho", "نگاه می‌کنم", "olhar - من نگاه می‌کنم"]
          - ["céu", "آسمان", "اسم"]

      - q: "Tu olhas para mim?"
        a: "آیا به من نگاه می‌کنی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["olhas", "نگاه می‌کنی", "olhar - تو نگاه می‌کنی"]
          - ["para mim", "به من", "حرف اضافه + ضمیر"]

      - q: "Ela olha pela janela."
        a: "او از پنجره نگاه می‌کند."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["olha", "نگاه می‌کند", "olhar - او نگاه می‌کند"]
          - ["janela", "پنجره", "اسم"]

      - q: "Nós olhamos as fotos."
        a: "ما عکس‌ها را نگاه می‌کنیم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["olhamos", "نگاه می‌کنیم", "olhar - ما نگاه می‌کنیم"]
          - ["fotos", "عکس‌ها", "اسم"]

      - q: "Vós olhais para trás?"
        a: "آیا به عقب نگاه می‌کنید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["olhais", "نگاه می‌کنید", "olhar - شما نگاه می‌کنید"]
          - ["para trás", "به عقب", "اصطلاح"]

      - q: "Eles olham o mapa."
        a: "آن‌ها نقشه را نگاه می‌کنند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["olham", "نگاه می‌کنند", "olhar - آن‌ها نگاه می‌کنند"]
          - ["mapa", "نقشه", "اسم"]

      - q: "Olhando ao redor, vejo tudo."
        a: "با نگاه کردن به اطراف، همه چیز را می‌بینم."
        labels: ["Gerúndio"]
        rel:
          - ["olhando", "نگاه کردن", "olhar - وجه وصفی"]
          - ["ao redor", "اطراف", "اصطلاح"]

  - title: "Pedir"
    explanation: |
      **Pedir** به معنی **درخواست کردن/سفارش دادن** است:
      - چیزی درخواست کردن
      - سفارش دادن (رستوران)
      - مطالبه کردن

      **صرف زمان حال**:
      - eu peço (من درخواست می‌کنم)
      - tu pedes (تو درخواست می‌کنی)
      - ele/ela/você pede (او درخواست می‌کند)
      - nós pedimos (ما درخواست می‌کنیم)
      - vós pedis (شما درخواست می‌کنید)
      - eles/elas pedem (آن‌ها درخواست می‌کنند)
      - **Gerúndio**: pedindo (درخواست کردن)
    examples:
      - q: "Eu peço desculpa."
        a: "من عذرخواهی می‌کنم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["peço", "درخواست می‌کنم", "pedir - من درخواست می‌کنم"]
          - ["desculpa", "عذرخواهی", "اسم"]

      - q: "Tu pedes ajuda?"
        a: "آیا کمک درخواست می‌کنی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["pedes", "درخواست می‌کنی", "pedir - تو درخواست می‌کنی"]
          - ["ajuda", "کمک", "اسم"]

      - q: "Ele pede uma cerveja."
        a: "او یک آبجو سفارش می‌دهد."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["pede", "سفارش می‌دهد", "pedir - او سفارش می‌دهد"]
          - ["cerveja", "آبجو", "اسم - نوشیدنی"]

      - q: "Nós pedimos silêncio."
        a: "ما درخواست سکوت می‌کنیم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["pedimos", "درخواست می‌کنیم", "pedir - ما درخواست می‌کنیم"]
          - ["silêncio", "سکوت", "اسم"]

      - q: "Vós pedis muito."
        a: "شما زیاد مطالبه می‌کنید."
        labels: ["حال", "دوم شخص جمع"]
        rel:
          - ["pedis", "مطالبه می‌کنید", "pedir - شما درخواست می‌کنید"]
          - ["muito", "زیاد", "قید"]

      - q: "Eles pedem informações."
        a: "آن‌ها اطلاعات درخواست می‌کنند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["pedem", "درخواست می‌کنند", "pedir - آن‌ها درخواست می‌کنند"]
          - ["informações", "اطلاعات", "اسم"]

      - q: "Pedindo licença, entro."
        a: "با اجازه خواستن، وارد می‌شوم."
        labels: ["Gerúndio"]
        rel:
          - ["pedindo", "درخواست کردن", "pedir - وجه وصفی"]
          - ["licença", "اجازه", "اسم"]

  - title: "Usar"
    explanation: |
      **Usar** به معنی **استفاده کردن/پوشیدن** است:
      - استفاده کردن از چیزی
      - لباس پوشیدن
      - به کار بردن

      **صرف زمان حال**:
      - eu uso (من استفاده می‌کنم)
      - tu usas (تو استفاده می‌کنی)
      - ele/ela/você usa (او استفاده می‌کند)
      - nós usamos (ما استفاده می‌کنیم)
      - vós usais (شما استفاده می‌کنید)
      - eles/elas usam (آن‌ها استفاده می‌کنند)
      - **Gerúndio**: usando (استفاده کردن)
    examples:
      - q: "Eu uso o computador."
        a: "من از کامپیوتر استفاده می‌کنم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["uso", "استفاده می‌کنم", "usar - من استفاده می‌کنم"]
          - ["computador", "کامپیوتر", "اسم - فناوری"]

      - q: "Tu usas óculos?"
        a: "آیا عینک می‌زنی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["usas", "می‌زنی", "usar - تو استفاده می‌کنی"]
          - ["óculos", "عینک", "اسم"]

      - q: "Ela usa sempre o telemóvel."
        a: "او همیشه از گوشی استفاده می‌کند."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["usa", "استفاده می‌کند", "usar - او استفاده می‌کند"]
          - ["sempre", "همیشه", "قید"]
          - ["telemóvel", "گوشی", "اسم - فناوری"]

      - q: "Nós usamos roupa confortável."
        a: "ما لباس راحت می‌پوشیم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["usamos", "می‌پوشیم", "usar - ما استفاده می‌کنیم"]
          - ["roupa", "لباس", "اسم"]
          - ["confortável", "راحت", "صفت"]

      - q: "Vós usais esta ferramenta?"
        a: "آیا از این ابزار استفاده می‌کنید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["usais", "استفاده می‌کنید", "usar - شما استفاده می‌کنید"]
          - ["ferramenta", "ابزار", "اسم"]

      - q: "Eles usam transportes públicos."
        a: "آن‌ها از حمل و نقل عمومی استفاده می‌کنند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["usam", "استفاده می‌کنند", "usar - آن‌ها استفاده می‌کنند"]
          - ["transportes públicos", "حمل و نقل عمومی", "اصطلاح"]

      - q: "Usando isto, consigo."
