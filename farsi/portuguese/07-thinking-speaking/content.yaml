  - title: "Ouvir"
    explanation: |
      **Ouvir** به معنی **شنیدن** است:
      - شنیدن، گوش دادن
      - به کسی گوش دادن
      - موسیقی گوش دادن

      **صرف زمان حال**:
      - eu ouço (من می‌شنوم)
      - tu ouves (تو می‌شنوی)
      - ele/ela/você ouve (او می‌شنود)
      - nós ouvimos (ما می‌شنویم)
      - vós ouvis (شما می‌شنوید)
      - eles/elas ouvem (آن‌ها می‌شنوند)
      - **Gerúndio**: ouvindo (شنیدن)
    examples:
      - q: "Eu ouço música."
        a: "من موسیقی گوش می‌دهم."
        labels: ["حال", "اول شخص مفرد"]
        rel:
          - ["ouço", "گوش می‌دهم", "ouvir - من می‌شنوم"]
          - ["música", "موسیقی", "اسم"]

      - q: "Tu ouves um barulho?"
        a: "آیا صدایی می‌شنوی؟"
        labels: ["حال", "دوم شخص مفرد", "سوال"]
        rel:
          - ["ouves", "می‌شنوی", "ouvir - تو می‌شنوی"]
          - ["barulho", "صدا/سروصدا", "اسم"]

      - q: "Ela ouve a rádio."
        a: "او رادیو گوش می‌دهد."
        labels: ["حال", "سوم شخص مفرد"]
        rel:
          - ["ouve", "گوش می‌دهد", "ouvir - او می‌شنود"]
          - ["rádio", "رادیو", "اسم"]

      - q: "Nós ouvimos a notícia."
        a: "ما خبر را می‌شنویم."
        labels: ["حال", "اول شخص جمع"]
        rel:
          - ["ouvimos", "می‌شنویم", "ouvir - ما می‌شنویم"]
          - ["notícia", "خبر", "اسم"]

      - q: "Vós ouvis os pássaros?"
        a: "آیا پرنده‌ها را می‌شنوید؟"
        labels: ["حال", "دوم شخص جمع", "سوال"]
        rel:
          - ["ouvis", "می‌شنوید", "ouvir - شما می‌شنوید"]
          - ["pássaros", "پرنده‌ها", "اسم - حیوان"]

      - q: "Eles ouvem conselhos."
        a: "آن‌ها به نصیحت‌ها گوش می‌دهند."
        labels: ["حال", "سوم شخص جمع"]
        rel:
          - ["ouvem", "گوش می‌دهند", "ouvir - آن‌ها می‌شنوند"]
          - ["conselhos", "نصیحت‌ها", "اسم"]

      - q: "Ouvindo isso, fico triste."
        a: "با شنیدن آن، غمگین می‌شوم."
        labels: ["Gerúndio"]
        rel:
          - ["ouvindo", "شنیدن", "ouvir - وجه وصفی"]
          - ["isso", "آن", "ضمیر"]
          - ["triste", "غمگین", "صفت"]

  - title: "اصطلاحات ارتباطی"
